syntax = "proto3";

package infer;

enum PixelFormat {
  PIXEL_FORMAT_UNSPECIFIED = 0;
  BGR24 = 1;
  RGB24 = 2;
  JPEG = 3; // NEW: frame contains JPEG-encoded bytes
}

service InferenceService {
  rpc Predict (PredictRequest) returns (PredictResponse);
  rpc PredictStream (stream PredictRequest) returns (stream PredictResponse);
}

message PredictRequest {
  bytes frame = 1;          // raw pixels (H*W*3) OR JPEG bytes when format=JPEG
  int32 width = 2;          // OPTIONAL for JPEG (can be 0); still populate if you want
  int32 height = 3;         // OPTIONAL for JPEG (can be 0); still populate if you want
  PixelFormat format = 4;   // BGR24 / RGB24 / JPEG
  int64 request_id = 5;
}

message Detection {
  float xmin = 1;
  float ymin = 2;
  float xmax = 3;
  float ymax = 4;
  float confidence = 5;
  int32 class_id = 6;
  string class_name = 7;
}

message PredictResponse {
  repeated Detection detections = 1;
  int64 request_id = 2;
}
